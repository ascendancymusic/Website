<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chiaroscuro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css"> <!-- Font Awesome for icons -->
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background-color: #000;
            background-size: cover;
            background-position: center;
            background-image: url('ChiaroscuroART.jpg'); /* Change the URL to your background image */
            overflow: hidden;
        }
        
        .container {
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }
        
        .cover {
            width: 500px; /* Adjust as needed */
            height: 500px; /* Adjust as needed */
            border-radius: 10px;
            overflow: hidden;
            position: relative;
        }
        
        .cover img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .overlay {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        
        .overlay a {
            text-decoration: none;
            color: #fff;
            font-size: 18px;
            margin: 10px 0;
            display: flex;
            align-items: center;
        }
        
        .overlay a i {
            margin-right: 10px;
        }
        
        .cover:hover .overlay {
            opacity: 1;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="cover">
            <img src="ChiaroscuroART.jpg" alt="Cover Image"> <!-- Change the URL to your cover image -->
            <div class="overlay">
                <a href="https://open.spotify.com/album/2NiBUT4DOS53JoBJkKUGQ1"><i class="fab fa-spotify"></i> Spotify</a> <!-- Replace "link-to-spotify" with the actual Spotify link -->
                <a href="https://music.apple.com/us/album/chiaroscuro/1733673620?i=1733673624"><i class="fab fa-apple"></i> Apple Music</a> <!-- Replace "link-to-apple-music" with the actual Apple Music link -->
                <a href="https://www.youtube.com/watch?v=RIB3wPQt8g0&ab_channel=AscenDancy"><i class="fab fa-youtube"></i> YouTube</a> <!-- Replace "link-to-youtube" with the actual YouTube link -->
                <a href="https://listen.tidal.com/album/348240901/track/348240902"><i class="fas fa-water"></i> TIDAL</a> <!-- Replace "link-to-tidal" with the actual TIDAL link -->
                <a href="https://music.amazon.com/albums/B0CWS45762?trackAsin=B0CWS41DYH"><i class="fab fa-amazon"></i> Amazon Music</a> <!-- Replace "link-to-amazon-music" with the actual Amazon Music link -->
                <a href="https://soundcloud.com/berxtothetom/chiaroscuro"><i class="fab fa-soundcloud"></i> SoundCloud</a> <!-- Replace "link-to-soundcloud" with the actual SoundCloud link -->
                <a href="https://music.youtube.com/watch?v=ynK0BTpJJxw"><i class="fab fa-youtube"></i> YouTube Music</a> <!-- Replace "link-to-youtube-music" with the actual YouTube Music link -->
            </div>
        </div>
    </div>
</body>
</html>
