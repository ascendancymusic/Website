    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css"> <!-- Font Awesome for icons -->
    <style>
        @font-face {
            font-family: 'Tex';
            src:
                 url('fonts/texgyreadventor-regular-webfont.woff') format('woff');
            font-weight: normal;
            font-style: normal;
        }
        
        body {
            margin: 0;
            padding: 0;
            font-family: "Tex";
            overflow: hidden;
        }
        
        .background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('media/solace.png'); /* Change the URL to your background image */
            background-size: cover;
            background-position: center;
            filter: blur(10px);
            z-index: -1;
            transition: transform 0.1s;
        }

        .container {
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column; /* Align items vertically */
            justify-content: center; /* Center items vertically */
            align-items: center; /* Center items horizontally */
            position: relative;
        }
        
        .cover-container {
            display: flex;
            align-items: center;
            position: relative;
            margin-bottom: 50px; /* Adjust spacing between cover image and links */
            width: 15%; /* Set cover container width as a percentage of the viewport width */
            max-width: 600px; /* Set maximum width for cover container */
            min-width: 125px; /* Set minimum width for cover container */
        }

        .cover {
            width: 100%; /* Set cover image width to 100% of its container */
            height: auto; /* Allow cover image height to adjust automatically */
            border-radius: 10px;
            overflow: hidden;
            position: relative;
            z-index: 1;
        }
        
        .cover img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .overlay {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .overlay a {
            text-decoration: none;
            color: #fff;
            font-size: 18px;
            text-shadow: 0 2px 5px rgba(0, 0, 0, 0.5);
            margin: 3px 0;
            display: flex;
            background: rgba(0, 0, 0, 0.25);
            align-items: center;
            padding: 10px 20px; /* Keep the same padding for all links */
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.3); /* Shadow effect */
            transition: background-color 0.5s;
            width: 200px; /* Set a fixed width for all links */
        }
        
        .overlay a i {
            margin-right: 10px;
        }

        /* Hover effect */
        .overlay a:hover {
            background: linear-gradient(to right, #08aa3e, #e22b86); /* Gradient from blue to purple */
        }

        .top-left-arrow {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 20px;
            color: #fff;
            text-decoration: none;
            z-index: 10;
            background: rgba(0, 0, 0, 0.5); /* Semi-transparent background */
            padding: 10px;
            border-radius: 20%;
            transition: background-color 0.3s;
        }

        .top-left-arrow:hover {
            background: linear-gradient(to right, #08aa3e, #e22b86); /* Change background color on hover */
        }

        .hover-text {
            position: absolute;
            top: 30px;
            left: 80px;
            font-size: 18px;
            color: #fff;
            opacity: 0;
            transition: opacity 0.3s, transform 0.3s;
        }

        .top-left-arrow:hover + .hover-text {
            opacity: 1;
            transform: translateX(10px);
        }
    </style>
</head>

    <script>
        document.addEventListener('mousemove', function(e) {
            const background = document.querySelector('.background');
            const moveX = (e.clientX / window.innerWidth) * 15;
            const moveY = (e.clientY / window.innerHeight) * 15;

            background.style.transform = `translate(-${moveX}px, -${moveY}px)`;
        });
